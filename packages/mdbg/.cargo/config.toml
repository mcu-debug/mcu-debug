[env]
TS_RS_EXPORT_DIR = { value = "../shared", relative = true }
TS_RS_LARGE_INT = "number"

# Cross-compilation linker configuration for building on macOS
# Linux release binaries use MUSL targets for static-friendly outputs.
# Install dependencies:
#   brew tap messense/macos-cross-toolchains
#   brew install x86_64-unknown-linux-musl aarch64-unknown-linux-musl
#   brew install mingw-w64

[target.aarch64-unknown-linux-musl]
linker = "aarch64-unknown-linux-musl-gcc"
# rustc handles stripping internally; no external llvm-strip needed for cross-compilation
rustflags = ["-C", "strip=symbols"]

[target.x86_64-unknown-linux-musl]
linker = "x86_64-unknown-linux-musl-gcc"
rustflags = ["-C", "strip=symbols"]

[target.x86_64-pc-windows-gnu]
linker = "x86_64-w64-mingw32-gcc"
ar = "x86_64-w64-mingw32-ar"
rustflags = ["-C", "target-feature=+crt-static"]

[target.aarch64-pc-windows-gnu]
linker = "aarch64-w64-mingw32-gcc"
ar = "aarch64-w64-mingw32-ar"
rustflags = ["-C", "target-feature=+crt-static"]
