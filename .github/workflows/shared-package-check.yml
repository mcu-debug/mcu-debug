name: Shared Package Check

on:
    pull_request:
    push:
        branches:
            - main
    workflow_dispatch:

jobs:
    shared-package:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - name: Install Dependencies
              run: npm ci

            - name: Validate Shared Package Boundary
              run: npm run check:shared-package
